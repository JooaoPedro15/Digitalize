<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Digitalize</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* (MANTIVE SEU CSS ORIGINAL AQUI PARA NÃO QUEBRAR O LAYOUT) */
        .admin-container { max-width: 1400px; margin: 0 auto; padding: 20px; background: var(--gray-50); min-height: 100vh; }
        .admin-header { background: var(--gradient-primary); color: white; padding: 30px; border-radius: var(--radius-xl); margin-bottom: 30px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; border-radius: var(--radius-xl); padding: 25px; box-shadow: var(--shadow-md); border: 1px solid var(--gray-200); }
        .stat-number { font-size: 2.5rem; font-weight: 800; color: var(--gray-800); }
        .admin-tabs { background: white; border-radius: var(--radius-xl); margin-bottom: 30px; }
        .tab-nav { display: flex; border-bottom: 1px solid var(--gray-200); }
        .tab-button { flex: 1; padding: 15px; border: none; background: none; cursor: pointer; font-weight: 600; color: var(--gray-600); }
        .tab-button.active { color: var(--primary-color); border-bottom: 3px solid var(--primary-color); }
        .tab-content { padding: 25px; display: none; }
        .tab-content.active { display: block; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td { padding: 15px; border-bottom: 1px solid var(--gray-200); text-align: left; }
        .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; }
        .status-pendente { background: #fff3cd; color: #856404; }
        .status-aprovada { background: #d4edda; color: #155724; }
        .status-rejeitada { background: #f8d7da; color: #721c24; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: var(--radius-xl); max-width: 800px; width: 90%; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .details-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .detail-item { display: flex; flex-direction: column; }
        .detail-label { font-weight: 600; color: var(--gray-600); font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="admin-container">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Voltar ao site</a>
        
        <div class="admin-header">
            <h1><i class="fas fa-shield-alt"></i> Painel Administrativo</h1>
        </div>
        
        <div id="alert-container"></div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="total-empresas">0</div>
                <div>Total de Empresas</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="empresas-pendentes">0</div>
                <div>Aguardando Aprovação</div>
            </div>
        </div>
        
        <div class="admin-tabs">
            <div class="tab-nav">
                <button class="tab-button active" data-tab="empresas">Gestão de Empresas</button>
                <button class="tab-button" data-tab="usuarios">Gestão de Usuários</button>
            </div>
            
            <div class="tab-content active" id="empresas-tab">
                <div id="empresas-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>CNPJ</th>
                                <th>Nome Fantasia</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="empresas-tbody"></tbody>
                    </table>
                </div>
            </div>
            
            <div class="tab-content" id="usuarios-tab">
                <div id="usuarios-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Email</th>
                                <th>Tipo</th>
                            </tr>
                        </thead>
                        <tbody id="usuarios-tbody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="empresaModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Detalhes da Empresa</h2>
                <button type="button" class="modal-close" id="empresa-modal-close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="modal-empresa-content"></div>
            <div class="modal-actions" id="modal-actions" style="margin-top: 20px; text-align: right;"></div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
    <script>
        // Verifica Admin
        if (!authSystem.isAdmin()) {
            alert('Acesso negado.');
            window.location.href = 'index.html';
        }

        class AdminPanel {
            constructor() {
                this.data = { empresas: [], usuarios: [] };
                this.init();
            }

            async init() {
                this.setupTabs();
                this.setupActions();
                await this.loadData();
                this.renderEmpresas();
                this.renderUsuarios();
                this.updateStats();
            }

            setupTabs() {
                document.querySelectorAll('.tab-button').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
                        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                        btn.classList.add('active');
                        document.getElementById(`${btn.dataset.tab}-tab`).classList.add('active');
                    });
                });
            }

            setupActions() {
                const empresasTbody = document.getElementById('empresas-tbody');
                empresasTbody.addEventListener('click', (event) => {
                    const button = event.target.closest('[data-action="view-empresa"]');
                    if (button) {
                        this.visualizarEmpresa(button.dataset.cnpj);
                    }
                });

                document.getElementById('empresa-modal-close').addEventListener('click', () => {
                    document.getElementById('empresaModal').classList.remove('show');
                });
            }

            async loadData() {
                try {
                    const [resEmp, resUser] = await Promise.all([
                        fetch('/api/empresas'),
                        fetch('/api/usuarios') // Essa rota precisa existir no Java ou retorna []
                    ]);
                    this.data.empresas = await resEmp.json();
                    this.data.usuarios = resUser.ok ? await resUser.json() : [];
                } catch (e) { console.error(e); }
            }

            renderEmpresas() {
                const tbody = document.getElementById('empresas-tbody');
                tbody.innerHTML = DigitalizeAdmin.renderEmpresaRows(this.data.empresas);
            }

            renderUsuarios() {
                const tbody = document.getElementById('usuarios-tbody');
                tbody.innerHTML = DigitalizeAdmin.renderUsuarios(this.data.usuarios);
            }

            updateStats() {
                document.getElementById('total-empresas').textContent = this.data.empresas.length;
                document.getElementById('empresas-pendentes').textContent = this.data.empresas.filter(e => e.status === 'pendente').length;
            }

            // --- CORREÇÃO DO ENDEREÇO AQUI ---
            visualizarEmpresa(cnpj) {
                const empresa = this.data.empresas.find(e => DigitalizeAdmin.onlyDigits(e.cnpj) === DigitalizeAdmin.onlyDigits(cnpj));
                if (!empresa) return;

                let enderecoHtml = '';
                if (typeof empresa.endereco === 'string') {
                    enderecoHtml = `<div class="detail-item"><span class="detail-label">Endereço</span><span>${DigitalizeAdmin.escapeHtml(empresa.endereco)}</span></div>`;
                } else if (empresa.endereco) {
                    enderecoHtml = `<div class="detail-item"><span class="detail-label">Cidade</span><span>${DigitalizeAdmin.escapeHtml(empresa.endereco.cidade || '-')}</span></div>`;
                }

                const content = document.getElementById('modal-empresa-content');
                content.innerHTML = `
                    <div class="details-grid">
                        <div class="detail-item"><span class="detail-label">Razão Social</span><span>${DigitalizeAdmin.escapeHtml(empresa.razaoSocial || empresa.razao_social || '-')}</span></div>
                        <div class="detail-item"><span class="detail-label">CNPJ</span><span>${DigitalizeAdmin.escapeHtml(empresa.cnpj || '-')}</span></div>
                        <div class="detail-item"><span class="detail-label">Segmento</span><span>${DigitalizeAdmin.escapeHtml(empresa.segmento || '-')}</span></div>
                        <div class="detail-item"><span class="detail-label">Email</span><span>${DigitalizeAdmin.escapeHtml(empresa.emailContato || empresa.email_contato || '-')}</span></div>
                        ${enderecoHtml}
                    </div>
                `;

                const actions = document.getElementById('modal-actions');
                actions.innerHTML = `
                    <button onclick="adminPanel.mudarStatus('${DigitalizeAdmin.onlyDigits(empresa.cnpj)}', 'aprovada')" style="background: green; color: white; padding: 10px; border:none; margin-right: 5px;">Aprovar</button>
                    <button onclick="adminPanel.mudarStatus('${DigitalizeAdmin.onlyDigits(empresa.cnpj)}', 'rejeitada')" style="background: red; color: white; padding: 10px; border:none;">Rejeitar</button>
                `;

                document.getElementById('empresaModal').classList.add('show');
            }

            async mudarStatus(cnpj, status) {
                if(!confirm(`Deseja marcar como ${status}?`)) return;
                try {
                    await fetch(`/api/empresas/${cnpj}/status`, {
                        method: 'PUT',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({status})
                    });
                    alert('Status atualizado!');
                    document.getElementById('empresaModal').classList.remove('show');
                    await this.loadData();
                    this.renderEmpresas();
                    this.updateStats();
                } catch(e) { alert('Erro ao atualizar'); }
            }
        }

        const adminPanel = new AdminPanel();
    </script>
</body>
</html>
