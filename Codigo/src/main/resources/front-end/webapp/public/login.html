<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digitalize - Login</title>
  <link rel="stylesheet" href="css/main.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
  <div id="login">
    <div class="container">
      <div id="login-row" class="row justify-content-center align-items-center">
        <div id="login-column" class="col-md-6">
          <div id="login-box" class="col-md-12">
            <div style="text-align: center; margin-bottom: 2rem;">
              <h3 class="text-dark">Bem-vindo de volta!</h3>
              <p class="text-muted">Faça login para acessar sua conta</p>
            </div>
            
            <form id="login-form">
              <div class="form-group mb-3">
                <label for="username" class="form-label">Email</label>
                <input type="email" name="username" id="username" class="form-control" placeholder="seu@email.com" required>
              </div>
              <div class="form-group mb-3">
                <label for="password" class="form-label">Senha</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="••••••••" required>
              </div>
              <div class="form-group text-center mt-4">
                <button type="submit" id="btn-login" class="btn btn-primary w-100 mb-2">Entrar</button>
                <button type="button" class="btn btn-outline-secondary w-100" data-bs-toggle="modal" data-bs-target="#loginModal">Criar nova conta</button>
              </div>
            </form>
            
            <div class="text-center mt-3 border-top pt-3">
              <a href="index.html" class="text-decoration-none">← Voltar ao site</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="loginModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title">Criar Nova Conta</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="register-form">
            <div class="row mb-3">
              <div class="col">
                <label class="form-label">Nome completo</label>
                <input type="text" id="txt_nome" class="form-control" required>
              </div>
              <div class="col">
                <label class="form-label">Email</label>
                <input type="email" id="txt_email" class="form-control" required>
              </div>
            </div>
            <div class="row mb-3">
              <div class="col">
                <label class="form-label">Senha</label>
                <input type="password" id="txt_senha" class="form-control" required>
              </div>
              <div class="col">
                <label class="form-label">Confirmar Senha</label>
                <input type="password" id="txt_senha2" class="form-control" required>
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" id="btn_salvar" class="btn btn-primary">Criar Conta</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;

    // --- LOGIN ---
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('username').value;
        const senha = document.getElementById('password').value;
        const btn = document.getElementById('btn-login');
        
        btn.innerText = "Entrando...";
        btn.disabled = true;

        try {
            const res = await fetch(`${API_BASE}/api/login`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email, senha })
            });

            if (res.ok) {
                const user = await res.json();
                localStorage.setItem('currentUser', JSON.stringify(user));
                
                alert("Login realizado com sucesso!");
                
                if (user.tipo === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'index.html';
                }
            } else {
                const erro = await res.json();
                alert(erro.error || "Email ou senha incorretos");
            }
        } catch (err) {
            console.error(err);
            alert("Erro de conexão com o servidor.");
        } finally {
            btn.innerText = "Entrar";
            btn.disabled = false;
        }
    });

    // --- CADASTRO ---
    document.getElementById('btn_salvar').addEventListener('click', async () => {
        const nome = document.getElementById('txt_nome').value;
        const email = document.getElementById('txt_email').value;
        const senha = document.getElementById('txt_senha').value;
        const senha2 = document.getElementById('txt_senha2').value;

        if (senha !== senha2) {
            alert('As senhas não conferem.');
            return;
        }

        const btn = document.getElementById('btn_salvar');
        btn.innerText = "Salvando...";
        btn.disabled = true;

        try {
            const res = await fetch(`${API_BASE}/api/usuarios`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ nome, email, senha, tipo: 'usuario' })
            });

            if (res.ok) {
                alert('Conta criada com sucesso! Faça login.');
                bootstrap.Modal.getInstance(document.getElementById('loginModal')).hide();
                document.getElementById('register-form').reset();
            } else {
                const erro = await res.json();
                alert("Erro: " + (erro.error || "Falha ao criar conta"));
            }
        } catch (err) {
            alert("Erro de conexão.");
        } finally {
            btn.innerText = "Criar Conta";
            btn.disabled = false;
        }
    });
  </script>
</body>
</html>
